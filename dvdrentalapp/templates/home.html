<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Inicial</title>
</head>
<body>
    <h1>Bem-vindo à Aplicação Django</h1>

    <p>Usuário: {{ user }}</p>
    <p>Autenticado: {{ user.is_authenticated }}</p>

    <a href="{% url 'cadastrar_usuario' %}">
        <button>Cadastrar Usuário</button>
    </a><br><br>

    {% if user.is_authenticated %}
        <a href="{% url 'alterar_senha' %}">
            <button>Alterar Senha</button>
        </a><br><br>

        <a href="{% url 'logout' %}">
            <button>Sair</button>
        </a>
    {% else %}
        <a href="{% url 'logar_usuario' %}">
            <button>Logar</button>
        </a>
    {% endif %}

</body>
</html>
