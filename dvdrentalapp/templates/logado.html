<!DOCTYPE html>
<html>
<body>

    <h1>Usuario logado com sucesso</h1>

    <p>Usuário: {{ user }}</p>
    <p>Autenticado: {{ user.is_authenticated }}</p>

    {% if user.is_authenticated %}
        <a href="{% url 'alterar_senha' %}">
            <button>Alterar Senha</button>
        </a><br><br>

        <a href="{% url 'logout' %}">
            <button>Sair</button>
        </a>
    {% endif %}
</body>
</html>
