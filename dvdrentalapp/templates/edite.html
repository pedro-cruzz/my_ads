<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
</head>
<body>

<h2>Editar Cliente</h2>

<form method="post">
    {% csrf_token %}
    <label for="first_name">Primeiro Nome:</label><br>
    <input type="text" id="first_name" name="first_name" value="{{ mycustomer.first_name }}"><br>

    <label for="last_name">Último Nome:</label><br>
    <input type="text" id="last_name" name="last_name" value="{{ mycustomer.last_name }}"><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" value="{{ mycustomer.email }}"><br>

    <!-- Adicione outros campos conforme necessário -->

    <input type="submit" value="Salvar Alterações">
</form>

</body>
</html>
